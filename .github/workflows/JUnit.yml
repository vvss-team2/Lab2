name: JUnit

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab2
    permissions:
      contents: read
      checks: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and Run Tests
        run: mvn -B test

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          check_name: Test Report
          report_paths: lab2/target/surefire-reports/TEST-*.xml
          detailed_summary: true
          include_passed: true

      - name: Generate Allure Report
        if: success() || failure()
        run: |
          wget -qO allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure.tgz
          allure-2.29.0/bin/allure generate target/allure-results -o "$GITHUB_WORKSPACE/allure-report" --clean

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

  publish-report:
    name: Publish Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (success() || failure())
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
